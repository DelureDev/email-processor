  - name: "Проспект мира"
    keywords:
      - "Детская стоматология"

  - name: "Ленинградка"
    keywords:
      - "Стоматология для детей и взрослых"

  - name: "Фрунзенская"
    keywords:
      - "Клиника Фэнтези"

  - name: "Брянская"
    keywords:
      - "Детская клиника"      


