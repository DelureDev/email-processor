# Clinic lookup table — Справочник подразделений
#
# For each clinic, list all keyword variations that insurance companies
# use to refer to it in their xlsx files. Matching is case-insensitive.
#
# Format:
#   - name: "Название клиники"  ← this goes into the Клиника column
#     keywords:
#       - "Как страховая пишет название"
#       - "Другой вариант написания"

clinics:
  - name: "Молодогвардейская"
    id: "000000004"
    keywords:
      - "Детский госпиталь"

  - name: "Гарибальди 15"
    id: "000000001"
    keywords:
      - "Детская стоматология №2"

  - name: "Проспект мира"
    id: "000000002"
    keywords:
      - "Детская стоматология"

  - name: "Ленинградка"
    id: "000000003"
    keywords:
      - "Стоматология для детей и взрослых"

  - name: "Фрунзенская"
    id: "000000007"
    keywords:
      - "Клиника Фэнтези"

  - name: "Гарибальди 36"
    id: "000000005"
    extract_comment: true      # extract Комментарий в полис for this clinic
    keywords:
      - "Детская клиника"


