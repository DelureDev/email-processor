# Clinic lookup table — Справочник подразделений
#
# For each clinic, list all keyword variations that insurance companies
# use to refer to it in their xlsx files. Matching is case-insensitive.
#
# Format:
#   - name: "Название клиники"  ← this goes into the Клиника column
#     keywords:
#       - "Как страховая пишет название"
#       - "Другой вариант написания"

clinics:
  - name: "Молодогвардейская"
    keywords:
      - "Детский госпиталь"

  - name: "Гарибальди 15"
