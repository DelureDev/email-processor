# ============================================
# Email Processor Configuration
# ============================================

# --- IMAP Settings (incoming email) ---
imap:
  server: imap.yandex.ru
  port: 993
  username: "your_email@yandex.ru"
  password: "your_app_password"       # Yandex app password (Settings → Security → App passwords)
  folder: "INBOX"
  days_back: 7                        # How many days back to scan
  # Subject keyword filter — emails must contain at least one of these in subject
  subject_keywords:
    - "открепление"
    - "список"
    - "прикрепление"
    - "бордеро"
    - "застрахованн"
    - "изменени"
    - "дополнительная информация"
    - "пароль"

# --- SMTP Settings (outgoing email reports) ---
smtp:
  enabled: false                      # Set to true to enable email reports
  server: smtp.yandex.ru
  port: 465
  use_ssl: true
  username: "your_email@yandex.ru"    # Usually same as IMAP
  password: "your_app_password"       # Usually same as IMAP
  from_address: "your_email@yandex.ru"
  # Recipients — who gets the daily report
  recipients:
    - "you@example.com"
    - "colleague@example.com"
  # Send report only if new records were found (true), or always (false)
  only_if_new_records: true

# --- Processing ---
processing:
  temp_folder: "./temp"
  processed_ids_file: "./processed_ids.json"
  # Deduplication: skip records matching ФИО + № полиса + Начало + Конец already in master
  deduplicate: true

# --- Output ---
output:
  # Master file path — set to your network drive
  # Windows: "\\\\server\\share\\reports\\master.xlsx"
  # Linux:   "/mnt/network_drive/reports/master.xlsx"
  master_file: "./output/master.xlsx"

# --- Logging ---
logging:
  file: "./logs/processor.log"
  level: "INFO"                       # DEBUG for troubleshooting

# --- Skip rules ---
skip_rules:
  # Filenames containing these substrings are skipped (case-insensitive)
  filename_contains:
    - "_all."
    - "_all_"
  # File extensions to ignore when found in emails
  ignore_extensions:
    - ".pdf"
    - ".docx"
    - ".doc"
    - ".jpg"
    - ".png"
