# ============================================
# Email Processor Configuration — EXAMPLE
# Copy this to config.yaml and fill in your values.
# config.yaml is gitignored and never committed.
# ============================================

# --- IMAP Settings (incoming email) ---
imap:
  server: imap.yandex.ru
  port: 993
  username: "your-bot@yourdomain.ru"
  password: "${IMAP_PASSWORD}"        # set env var, or paste password directly
  folder: "INBOX"
  processed_folder: "Обработанные"     # move successfully parsed emails here (leave empty to disable)
  # Path to the Zetta monthly-password disk cache (v1.10.8+).
  # Gitignored, mode 0600 on POSIX, auto-expires when valid_to < today.
  # The cache lets the pipeline skip IMAP SEARCH for the monthly password
  # 29/30 days — makes Zetta extraction immune to Yandex FROM-filter flakes.
  zetta_password_cache: "./zetta_password.json"
  days_back: 3                        # How many days back to scan
  subject_keywords:
    - "открепл"
    - "спис"
    - "прикрепл"
    - "бордеро"
    - "застрахованн"
    - "изменени"
    - "дополнительная информация"
    - "пароль"
    - "soglasie"
    - "капитал лайф"

# --- SMTP Settings (outgoing email reports) ---
smtp:
  enabled: true
  server: smtp.yandex.ru
  port: 465
  use_ssl: true
  username: "your-bot@yourdomain.ru"
  password: "${SMTP_PASSWORD}"        # set env var, or paste password directly
  from_address: "your-bot@yourdomain.ru"
  recipients:
    - "you@yourdomain.ru"
  only_if_new_records: true

# --- Processing ---
processing:
  temp_folder: "./temp"
  processed_ids_file: "./processed_ids.json"
  quarantine_folder: "./quarantine"   # files that fail parsing land here
  deduplicate: true

# --- Healthcheck (https://healthchecks.io — free tier) ---
# Paste your ping URL here. Leave empty to disable.
healthcheck_url: ""   # e.g. https://hc-ping.com/your-uuid-here

# --- Output ---
output:
  # Master file — keep LOCAL (./output/). Lock files and CSV backup are created
  # next to it. Do NOT point this at the network share.
  master_file: "./output/master.xlsx"

  # Network share for 1C integration (optional, leave empty to disable).
  # Only two file types are written here:
  #   records_YYYY-MM-DD.csv  — daily delta (appended across runs within the day)
  #   master_YYYY-MM.csv      — monthly cumulative (new file each month)
  # Network share path for daily + monthly CSV export.
  # Empty string = disabled. Typically "/mnt/storage" on the production VM.
  csv_export_folder: ""
  # Seconds to wait when probing the network share at startup (default: 10).
  # If the mount has gone dead, we skip the export rather than hang.
  network_timeout: 10
  # Seconds to wait for each CSV write (daily + monthly) before giving up.
  # With a 'soft' CIFS mount, writes fail fast with EIO — this cap just
  # protects against 'hard' mounts or a server that stalls mid-write.
  network_write_timeout: 30

# --- Logging ---
logging:
  file: "./logs/processor.log"
  level: "INFO"

# --- Skip rules ---
skip_rules:
  filename_contains:
    - "_all."
    - "_all_"
    - "Ср("
  ignore_extensions:
    - ".pdf"
    - ".docx"
    - ".doc"
    - ".jpg"
    - ".png"
    - ".rtf"
    - ".sig"
